name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pingboard
          POSTGRES_PASSWORD: pingboard
          POSTGRES_DB: pingboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://pingboard:pingboard@localhost:5432/pingboard_test
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://pingboard:pingboard@localhost:5432/pingboard_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_for_ci
          NODE_ENV: test
          GITHUB_CLIENT_ID: dummy_client_id_for_ci
          GITHUB_CLIENT_SECRET: dummy_client_secret_for_ci
          SESSION_SECRET: dummy_session_secret_for_ci
        run: pnpm test

      - name: Build TypeScript
        working-directory: apps/api
        run: pnpm build